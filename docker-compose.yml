services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neomarket_tea_b2c}
      POSTGRES_USER: ${POSTGRES_USER:-neomarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neomarket_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neomarket} -d ${POSTGRES_DB:-neomarket_tea_b2c}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_tea:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-NeoMarket B2C}
      APP_ENV: ${APP_ENV:-production}
      AUTO_SEED: ${AUTO_SEED:-true}
      DEMO_USER_ID: ${DEMO_USER_ID:-11111111-1111-1111-1111-111111111111}
      DEMO_SESSION_ID: ${DEMO_SESSION_ID:-sess-demo-001}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neomarket:neomarket_pass@postgres:5432/neomarket_tea_b2c}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-127.0.0.1,localhost}
    ports:
      - "${API_BIND_IP:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_tea:
